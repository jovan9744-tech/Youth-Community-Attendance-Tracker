<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Kingdom Fun Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #F4F6FA;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-container {
    display: flex;
    width: 900px;
    max-width: 100%;
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    min-height: 520px;
  }

  /* Left panel */
  .login-left {
    flex: 1;
    background: linear-gradient(145deg, #C0392B 0%, #922B21 50%, #7B241C 100%);
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .login-left::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 240px; height: 240px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .login-left::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -40px;
    width: 280px; height: 280px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .brand-logo {
    display: flex; align-items: center; gap: 14px;
    position: relative; z-index: 1;
  }
  .brand-logo img { width: 56px; height: 56px; object-fit: contain; }
  .brand-name h1 { font-size: 17px; font-weight: 800; color: white; letter-spacing: -0.3px; line-height: 1.2; }
  .brand-name p { font-size: 11.5px; color: rgba(255,255,255,0.6); font-weight: 500; margin-top: 2px; }

  .left-tagline {
    position: relative; z-index: 1;
  }
  .left-tagline h2 { font-size: 28px; font-weight: 800; color: white; letter-spacing: -0.5px; line-height: 1.3; }
  .left-tagline p { font-size: 13px; color: rgba(255,255,255,0.65); margin-top: 10px; font-weight: 500; line-height: 1.6; }

  .left-dots {
    display: flex; gap: 6px;
    position: relative; z-index: 1;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); }
  .dot.active { background: white; width: 18px; border-radius: 3px; }

  /* Right panel */
  .login-right {
    width: 380px;
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .login-right h2 { font-size: 22px; font-weight: 800; color: #1a1a2e; letter-spacing: -0.4px; }
  .login-right p { font-size: 13px; color: #8892A4; margin-top: 6px; font-weight: 500; }

  .form-section { margin-top: 32px; }
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: #4A5568; margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input {
    width: 100%; padding: 12px 16px;
    border: 1.5px solid #E8ECF4;
    border-radius: 10px;
    font-family: 'Inter', sans-serif; font-size: 14px;
    color: #1a1a2e; background: #F8FAFD;
    outline: none; transition: all 0.2s;
  }
  .form-input:focus { border-color: #C0392B; background: white; box-shadow: 0 0 0 4px rgba(192,57,43,0.08); }
  .form-input::placeholder { color: #B8C0CC; }

  .btn-login {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #C0392B, #922B21);
    color: white; border: none; border-radius: 10px;
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(192,57,43,0.35);
    letter-spacing: 0.2px; margin-top: 4px;
  }
  .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(192,57,43,0.4); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .alert-error {
    background: #FFF0EE; color: #C0392B;
    border: 1px solid #FFCDC8;
    padding: 10px 14px; border-radius: 8px;
    font-size: 13px; font-weight: 500;
    margin-bottom: 16px; display: none;
  }
  .alert-error.show { display: block; }

  .login-footer { margin-top: 24px; font-size: 12px; color: #B8C0CC; text-align: center; font-weight: 500; }

  @media (max-width: 700px) {
    .login-left { display: none; }
    .login-right { width: 100%; padding: 40px 28px; }
  }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-left">
    <div class="brand-logo">
      <img src="/static/logo.png" alt="KFC Logo">
      <div class="brand-name">
        <h1>Kingdom Fun Club</h1>
        <p>Youth Attendance Tracker</p>
      </div>
    </div>
    <div class="left-tagline">
      <h2>Keep Funky. Be Holy.<br>Party.</h2>
      <p>Monitor Kehadiran Jemaat Youth KFClub<br>Every Saturday at 6.00 Pm</p>
    </div>
    <div class="left-dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <div class="login-right">
    <h2>Selamat datang 👋</h2>
    <p>Masuk ke dashboard Kingdom Fun Club</p>
    <div class="form-section">
      <div class="alert-error" id="error-msg"></div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-input" placeholder="Masukkan username" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-login" id="login-btn" onclick="doLogin()">Masuk ke Dashboard</button>
    </div>
    <div class="login-footer">Kingdom Fun Club Youth © 2026</div>
  </div>
</div>
<script>
  document.getElementById("password").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  async function doLogin() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const btn = document.getElementById("login-btn");
    const errEl = document.getElementById("error-msg");
    errEl.classList.remove("show");
    if (!username || !password) { errEl.textContent = "Username dan password wajib diisi."; errEl.classList.add("show"); return; }
    btn.disabled = true; btn.textContent = "Memproses...";
    try {
      const res = await fetch("/api/auth/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username, password }) });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error || "Login gagal."; errEl.classList.add("show"); btn.disabled = false; btn.textContent = "Masuk ke Dashboard"; return; }
      window.location.href = "/";
    } catch(e) { errEl.textContent = "Tidak bisa terhubung ke server."; errEl.classList.add("show"); btn.disabled = false; btn.textContent = "Masuk ke Dashboard"; }
  }
</script>
</body>
</html>
